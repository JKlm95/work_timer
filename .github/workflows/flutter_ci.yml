# CI: push / pull_request → main — format, analiza, testy, build APK (debug).
# W repozytorium: Settings → Actions — workflowy muszą być włączone.

name: Flutter CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: dart format --set-exit-if-changed .
        run: dart format --set-exit-if-changed .

      - name: flutter analyze --no-fatal-infos
        run: flutter analyze --no-fatal-infos

      - name: flutter test
        run: flutter test

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "tools platform-tools platforms;android-35 build-tools;35.0.0"

      - name: flutter build apk --debug
        run: flutter build apk --debug
